name: gitplus_for_gitlab
description: GitLab unofficial client for Android.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 2.0.0+28

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  adaptive_theme: ^3.1.0
  build_runner: ^2.1.7
  cached_network_image: ^3.2.1
  date_time_picker: ^2.1.0
  dio: ^5.9.2
  file_icon: ^1.0.0
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  dynamic_color: ^1.6.8
  flutter_easyloading: ^3.0.5
  flutter_markdown: ^0.7.7+1
  flutter_native_splash: ^2.2.5
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  flutter_vector_icons: ^2.0.0
  fluttertoast: ^9.0.0
  get: ^4.6.5
  grouped_list: ^6.0.0
  intl: ^0.17.0
  json_serializable: ^6.1.3
  json_annotation: ^4.11.0
  material_new_shapes: ^1.0.0
  # path: ^1.8.2
  share_plus: ^12.0.2
  shared_preferences: ^2.0.15
  sticky_headers: ^0.3.0+2
  timeago: ^3.2.2
  url_launcher: ^6.1.5
  path_provider: ^2.0.11
  package_info_plus: ^9.0.1
  rxdart: ^0.28.0
  path: ^1.9.1
  string_scanner: ^1.4.1
  timelines_plus: ^2.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo/2.svg

  fonts:
    - family: SourceCodePro
      fonts:
        - asset: fonts/SourceCodePro-Black.ttf
        - asset: fonts/SourceCodePro-BlackIt.ttf
        - asset: fonts/SourceCodePro-Bold.ttf
        - asset: fonts/SourceCodePro-BoldIt.ttf
        - asset: fonts/SourceCodePro-ExtraLight.ttf
        - asset: fonts/SourceCodePro-ExtraLightIt.ttf
        - asset: fonts/SourceCodePro-It.ttf
        - asset: fonts/SourceCodePro-Light.ttf
        - asset: fonts/SourceCodePro-Medium.ttf
        - asset: fonts/SourceCodePro-MediumIt.ttf
        - asset: fonts/SourceCodePro-Regular.ttf
        - asset: fonts/SourceCodePro-Semibold.ttf
        - asset: fonts/SourceCodePro-SemiboldIt.ttf

flutter_native_splash:
  # flutter pub run flutter_native_splash:create
  # flutter pub run flutter_native_splash:remove
  color: "#ffffff"
  color_dark: "#330d69"
  image: assets/splash_400.png
  android: true
  ios: true
  web: false
